version: "3.9"

services:
  db:
    image: postgres:15
    container_name: chat_db
    restart: always
    environment:
      POSTGRES_USER: deepali
      POSTGRES_PASSWORD: deepali123
      POSTGRES_DB: chat_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: chat_backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://deepali:deepali123@db:5432/chat_app"
      SECRET_KEY: "supersecret123"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data:
